<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-dark" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a1f0a"/>
    </linearGradient>
    <linearGradient id="circle-fill" x1="0" y1="80" x2="0" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="icon" x1="0" y1="100" x2="0" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="lockbody" x1="0" y1="240" x2="0" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="keyhole-grad" x1="256" y1="280" x2="256" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
  </defs>

  <!-- Background: dark gray → very dark green -->
  <rect width="512" height="512" rx="90" fill="url(#bg-dark)"/>

  <!-- Green circle -->
  <circle cx="256" cy="256" r="232" fill="url(#circle-fill)"/>

  <!-- Left brace — slightly smaller, same position -->
  <path d="
    M168 158
    C142 158, 128 180, 128 206
    L128 238
    C128 254, 116 264, 102 264
    C116 264, 128 274, 128 290
    L128 322
    C128 348, 142 370, 168 370
  " stroke="url(#icon)" stroke-width="26" stroke-linecap="round" fill="none"/>

  <!-- Right brace — slightly smaller, same position -->
  <path d="
    M344 158
    C370 158, 384 180, 384 206
    L384 238
    C384 254, 396 264, 410 264
    C396 264, 384 274, 384 290
    L384 322
    C384 348, 370 370, 344 370
  " stroke="url(#icon)" stroke-width="26" stroke-linecap="round" fill="none"/>

  <!-- Lock shackle — shorter arc -->
  <path d="M214 260 V222 C214 194, 232 176, 256 176 C280 176, 298 194, 298 222 V260"
        stroke="url(#icon)" stroke-width="24" stroke-linecap="round" fill="none"/>

  <!-- Lock body -->
  <rect x="192" y="260" width="128" height="106" rx="18" fill="url(#lockbody)"/>

  <!-- Keyhole -->
  <circle cx="256" cy="300" r="16" fill="url(#keyhole-grad)"/>
  <path d="M249 312 L256 344 L263 312 Z" fill="url(#keyhole-grad)"/>
</svg>
