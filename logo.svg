<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>

  <!-- V shape formed by two halves — left half solid (revealed), right half dashed/fragmented (encrypted) -->

  <!-- Left arm of V — solid, clean -->
  <path d="M96 112L256 400" stroke="url(#grad)" stroke-width="56" stroke-linecap="round"/>

  <!-- Right arm of V — fragmented/dissolving into segments -->
  <path d="M416 112L384 176" stroke="#6366f1" stroke-width="56" stroke-linecap="round"/>
  <path d="M368 208L340 264" stroke="#6366f1" stroke-width="56" stroke-linecap="round" opacity="0.7"/>
  <path d="M324 296L296 352" stroke="#818cf8" stroke-width="56" stroke-linecap="round" opacity="0.45"/>
  <path d="M280 368L256 400" stroke="#a78bfa" stroke-width="56" stroke-linecap="round" opacity="0.2"/>
</svg>
